python:
  extensions: [".py", ".pyw", ".pyi"]
  grammar: "tree_sitter_python"
  nodes:
    function: "function_definition"
    class: "class_definition"
    import: ["import_statement", "import_from_statement"]

javascript:
  extensions: [".js", ".jsx", ".mjs", ".cjs"]
  grammar: "tree_sitter_javascript"
  nodes:
    function: ["function_declaration", "method_definition", "arrow_function"]
    class: "class_declaration"
    import: ["import_statement", "export_statement"]

typescript:
  extensions: [".ts", ".tsx", ".mts", ".cts"]
  grammar: "tree_sitter_typescript"
  nodes:
    function: ["function_declaration", "method_definition", "arrow_function"]
    class: ["class_declaration", "abstract_class_declaration"]
    import: ["import_statement", "export_statement"]

go:
  extensions: [".go"]
  grammar: "tree_sitter_go"
  nodes:
    function: ["function_declaration", "method_declaration"]
    class: "type_declaration"
    import: "import_declaration"

rust:
  extensions: [".rs"]
  grammar: "tree_sitter_rust"
  nodes:
    function: ["function_item", "function_signature_item"]
    class: ["struct_item", "enum_item", "trait_item", "impl_item"]
    import: ["use_declaration", "extern_crate_declaration"]

java:
  extensions: [".java"]
  grammar: "tree_sitter_java"
  nodes:
    function: ["method_declaration", "constructor_declaration"]
    class: ["class_declaration", "interface_declaration", "enum_declaration"]
    import: "import_declaration"

c:
  extensions: [".c", ".h"]
  grammar: "tree_sitter_c"
  nodes:
    function: "function_definition"
    class: "struct_specifier"
    import: ["preproc_include", "preproc_def"]

cpp:
  extensions: [".cpp", ".cc", ".cxx", ".hpp", ".h", ".hh", ".hxx"]
  grammar: "tree_sitter_cpp"
  nodes:
    function: ["function_definition", "lambda_expression"]
    class: ["class_specifier", "struct_specifier", "enum_specifier"]
    import: ["preproc_include", "preproc_def"]

csharp:
  extensions: [".cs"]
  grammar: "tree_sitter_c_sharp"
  nodes:
    function: ["method_declaration", "constructor_declaration", "local_function_statement"]
    class: ["class_declaration", "interface_declaration", "struct_declaration", "enum_declaration", "record_declaration"]
    import: ["using_directive", "extern_alias_directive"]

ruby:
  extensions: [".rb", ".rbw", ".rake", ".gemspec"]
  grammar: "tree_sitter_ruby"
  nodes:
    function: ["method", "singleton_method", "lambda", "proc", "block"]
    class: ["class", "module", "singleton_class"]
    import: ["require", "require_relative", "load"]

php:
  extensions: [".php", ".php3", ".php4", ".php5", ".phtml"]
  grammar: "tree_sitter_php"
  nodes:
    function: ["function_definition", "method_declaration", "anonymous_function_creation_expression", "arrow_function"]
    class: ["class_declaration", "interface_declaration", "trait_declaration", "enum_declaration"]
    import: ["namespace_use_declaration", "namespace_use_group", "require", "include", "require_once", "include_once"]

swift:
  extensions: [".swift"]
  grammar: "tree_sitter_swift"
  nodes:
    function: ["function_declaration", "deinit_declaration", "initializer_declaration"]
    class: ["class_declaration", "struct_declaration", "enum_declaration", "protocol_declaration", "actor_declaration"]
    import: "import_declaration"

kotlin:
  extensions: [".kt", ".kts"]
  grammar: "tree_sitter_kotlin"
  nodes:
    function: ["function_declaration", "secondary_constructor", "anonymous_function", "lambda_literal"]
    class: ["class_declaration", "object_declaration", "companion_object", "interface_declaration", "enum_class_declaration"]
    import: ["import_header", "package_header"]

scala:
  extensions: [".scala", ".sc"]
  grammar: "tree_sitter_scala"
  nodes:
    function: ["function_definition", "function_declaration", "macro_definition"]
    class: ["class_definition", "trait_definition", "object_definition", "enum_definition", "given_definition"]
    import: ["import_declaration", "export_declaration"]

elixir:
  extensions: [".ex", ".exs"]
  grammar: "tree_sitter_elixir"
  nodes:
    function: ["function", "anonymous_function", "stab_clause"]
    class: ["module", "protocol", "implementation"]
    import: ["alias", "require", "import", "use"]

erlang:
  extensions: [".erl", ".hrl"]
  grammar: "tree_sitter_erlang"
  nodes:
    function: "function_declaration"
    class: "attribute"
    import: "attribute"

haskell:
  extensions: [".hs", ".lhs"]
  grammar: "tree_sitter_haskell"
  nodes:
    function: ["function", "signature", "bind"]
    class: ["class", "instance", "newtype", "data", "type"]
    import: "import"

lua:
  extensions: [".lua"]
  grammar: "tree_sitter_lua"
  nodes:
    function: ["function_declaration", "function_definition", "local_function"]
    class: "table_constructor"
    import: ["require_call", "dofile", "loadfile"]

perl:
  extensions: [".pl", ".pm", ".t"]
  grammar: "tree_sitter_perl"
  nodes:
    function: ["subroutine_declaration_statement", "anonymous_subroutine_expression"]
    class: ["package_statement", "class_statement"]
    import: ["use_statement", "require_statement", "no_statement"]

r:
  extensions: [".r", ".R", ".rmd", ".Rmd"]
  grammar: "tree_sitter_r"
  nodes:
    function: ["function_definition", "lambda_function"]
    class: ["class_definition", "setClass", "setRefClass"]
    import: ["call", "library", "require", "source"]

matlab:
  extensions: [".m", ".mlx"]
  grammar: "tree_sitter_matlab"
  nodes:
    function: ["function_definition", "classdef_method", "function"]
    class: "class_definition"
    import: "import_command"

julia:
  extensions: [".jl"]
  grammar: "tree_sitter_julia"
  nodes:
    function: ["function_definition", "short_function_definition", "macro_definition", "do_clause"]
    class: ["struct_definition", "abstract_definition", "primitive_type", "module_definition"]
    import: ["import_statement", "using_statement", "export_statement"]

dart:
  extensions: [".dart"]
  grammar: "tree_sitter_dart"
  nodes:
    function: ["function_declaration", "method_declaration", "function_expression", "constructor_declaration"]
    class: ["class_definition", "mixin_declaration", "extension_declaration", "enum_declaration"]
    import: ["import_specification", "export_specification", "part_directive", "part_of_directive"]

clojure:
  extensions: [".clj", ".cljs", ".cljc", ".edn"]
  grammar: "tree_sitter_clojure"
  nodes:
    function: ["defn", "defn-", "fn", "defmacro"]
    class: ["defprotocol", "deftype", "defrecord", "defmulti", "defmethod"]
    import: ["ns", "require", "use", "import"]

groovy:
  extensions: [".groovy", ".gvy", ".gy", ".gsh"]
  grammar: "tree_sitter_groovy"
  nodes:
    function: ["method_declaration", "constructor_declaration", "closure_expression"]
    class: ["class_declaration", "interface_declaration", "enum_declaration", "trait_declaration"]
    import: ["import_declaration", "package_declaration"]

objc:
  extensions: [".m", ".mm", ".h"]
  grammar: "tree_sitter_objc"
  nodes:
    function: ["function_definition", "method_declaration"]
    class: ["class_interface", "class_implementation", "protocol_declaration", "category_interface", "category_implementation"]
    import: ["preproc_include", "preproc_import"]

shell:
  extensions: [".sh", ".bash", ".zsh", ".fish", ".ksh", ".csh"]
  grammar: "tree_sitter_bash"
  nodes:
    function: ["function_definition", "command", "subshell"]
    class: "command"
    import: ["source_command", "file_redirect"]

powershell:
  extensions: [".ps1", ".psm1", ".psd1"]
  grammar: "tree_sitter_powershell"
  nodes:
    function: ["function_definition", "filter_definition", "workflow_definition"]
    class: ["class_definition", "enum_definition"]
    import: ["using_statement", "requires_statement", "import_module", "dot_source_expression"]

sql:
  extensions: [".sql"]
  grammar: "tree_sitter_sql"
  nodes:
    function: ["create_function", "function_call", "routine_definition"]
    class: ["create_table", "create_view", "create_type"]
    import: ["import_statement", "copy_from"]

html:
  extensions: [".html", ".htm", ".xhtml"]
  grammar: "tree_sitter_html"
  nodes:
    function: "script_element"
    class: "style_element"
    import: ["link_element", "script_element"]

css:
  extensions: [".css", ".scss", ".sass", ".less", ".styl"]
  grammar: "tree_sitter_css"
  nodes:
    function: ["at_rule", "media_rule", "supports_rule"]
    class: ["rule_set", "class_selector"]
    import: ["import_statement", "at_import"]

json:
  extensions: [".json", ".jsonc", ".json5"]
  grammar: "tree_sitter_json"
  nodes:
    function: "pair"
    class: "object"
    import: "string"

yaml:
  extensions: [".yaml", ".yml"]
  grammar: "tree_sitter_yaml"
  nodes:
    function: "block_mapping_pair"
    class: "block_mapping"
    import: "anchor"

toml:
  extensions: [".toml"]
  grammar: "tree_sitter_toml"
  nodes:
    function: "pair"
    class: "table"
    import: "string"

xml:
  extensions: [".xml", ".xsd", ".xsl", ".xslt", ".svg", ".rss", ".atom"]
  grammar: "tree_sitter_xml"
  nodes:
    function: "element"
    class: "element"
    import: ["externalid", "processing_instructions"]

graphql:
  extensions: [".graphql", ".gql"]
  grammar: "tree_sitter_graphql"
  nodes:
    function: ["field_definition", "operation_definition"]
    class: ["object_type_definition", "interface_type_definition", "enum_type_definition"]
    import: "import"

protobuf:
  extensions: [".proto"]
  grammar: "tree_sitter_proto"
  nodes:
    function: ["rpc", "method"]
    class: ["message", "enum", "service"]
    import: ["import", "package"]

solidity:
  extensions: [".sol"]
  grammar: "tree_sitter_solidity"
  nodes:
    function: ["function_definition", "modifier_definition", "constructor_definition", "receive_definition", "fallback_definition"]
    class: ["contract_declaration", "interface_declaration", "library_declaration"]
    import: ["import_directive", "using_directive"]

vyper:
  extensions: [".vy"]
  grammar: "tree_sitter_vyper"
  nodes:
    function: ["function_def", "event_def"]
    class: "contract_def"
    import: "import_statement"

zig:
  extensions: [".zig", ".zon"]
  grammar: "tree_sitter_zig"
  nodes:
    function: ["function_declaration", "test_declaration"]
    class: ["struct_declaration", "union_declaration", "enum_declaration", "opaque_declaration"]
    import: ["usingnamespace", "@import"]

nim:
  extensions: [".nim", ".nims", ".nimble"]
  grammar: "tree_sitter_nim"
  nodes:
    function: ["proc_declaration", "func_declaration", "method_declaration", "iterator_declaration", "converter_declaration", "template_declaration", "macro_declaration", "lambda"]
    class: ["type_declaration", "object_declaration", "tuple_declaration", "enum_declaration", "concept_declaration"]
    import: ["import_statement", "include_statement", "from_statement", "export_statement"]

crystal:
  extensions: [".cr"]
  grammar: "tree_sitter_crystal"
  nodes:
    function: ["def", "macro", "block", "proc"]
    class: ["class", "struct", "module", "enum", "annotation", "lib"]
    import: ["require", "include", "extend"]

ocaml:
  extensions: [".ml", ".mli"]
  grammar: "tree_sitter_ocaml"
  nodes:
    function: ["value_definition", "external", "method_definition"]
    class: ["type_definition", "class_definition", "class_type_definition", "module_definition", "module_type_definition"]
    import: ["open_module", "include_module"]

fsharp:
  extensions: [".fs", ".fsx", ".fsi"]
  grammar: "tree_sitter_fsharp"
  nodes:
    function: ["function_declaration", "member_declaration", "let_binding", "do_binding"]
    class: ["type_definition", "class_type", "interface_type", "enum_type", "union_type", "record_type"]
    import: ["open_statement", "module_declaration", "namespace_declaration"]

elm:
  extensions: [".elm"]
  grammar: "tree_sitter_elm"
  nodes:
    function: ["function_declaration_left", "anonymous_function_expr", "operator_declaration"]
    class: ["type_declaration", "type_alias_declaration", "port_annotation"]
    import: ["import_clause", "exposing_list"]

purescript:
  extensions: [".purs"]
  grammar: "tree_sitter_purescript"
  nodes:
    function: ["function", "foreign_value", "class_member"]
    class: ["class_declaration", "data_declaration", "newtype_declaration", "type_declaration", "instance_declaration"]
    import: ["import_statement", "export_statement"]

reason:
  extensions: [".re", ".rei"]
  grammar: "tree_sitter_reason"
  nodes:
    function: ["function", "fun_expression", "method"]
    class: ["module_declaration", "module_type_declaration", "type_declaration"]
    import: ["open_description", "include_description"]

gleam:
  extensions: [".gleam"]
  grammar: "tree_sitter_gleam"
  nodes:
    function: ["function", "anonymous_function"]
    class: ["type_definition", "type_alias", "custom_type"]
    import: ["import", "unqualified_import"]

wren:
  extensions: [".wren"]
  grammar: "tree_sitter_wren"
  nodes:
    function: ["method_signature", "function"]
    class: ["class_definition", "foreign_class"]
    import: ["import_statement"]

hare:
  extensions: [".ha"]
  grammar: "tree_sitter_hare"
  nodes:
    function: ["fndecl", "func"]
    class: ["type_decl", "struct_type", "union_type"]
    import: "use"

odin:
  extensions: [".odin"]
  grammar: "tree_sitter_odin"
  nodes:
    function: ["procedure_declaration", "procedure"]
    class: ["struct_declaration", "union_declaration", "enum_declaration", "bit_field_declaration"]
    import: "import_statement"

c3:
  extensions: [".c3"]
  grammar: "tree_sitter_c3"
  nodes:
    function: ["func_definition", "macro_declaration"]
    class: ["struct_declaration", "union_declaration", "enum_declaration", "fault_declaration", "bitstruct_declaration"]
    import: ["import_declaration", "module_declaration"]

mojo:
  extensions: [".mojo", ".🔥"]
  grammar: "tree_sitter_mojo"
  nodes:
    function: ["function_declaration", "decorated_declaration"]
    class: ["struct_declaration", "trait_declaration"]
    import: ["import_statement", "from_import_statement"]

carbon:
  extensions: [".carbon"]
  grammar: "tree_sitter_carbon"
  nodes:
    function: ["function_declaration", "method_declaration"]
    class: ["class_declaration", "interface_declaration", "constraint_declaration"]
    import: "import_directive"